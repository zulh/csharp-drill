<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="description" content="A keyboard-driven C#/.NET interview study tool — say-it-out-loud recall cards plus MCQ quiz, with spaced repetition.">
<title>C# Drill — Interview Recall</title>
<style>
  html, body { margin: 0; padding: 0; }
  :root {
    --bg: #f6f5fa;
    --surface: #ffffff;
    --surface-2: #efedf6;
    --ink: #1b1a24;
    --muted: #6b6880;
    --faint: #948fa8;
    --line: #e4e1ee;
    --accent: #6d4aff;
    --accent-strong: #512bd4;
    --accent-soft: #ece7ff;
    --good: #2f9e69;
    --good-soft: #e3f3ea;
    --warn: #cf8a2c;
    --warn-soft: #f7ecd9;
    --bad: #d1495b;
    --bad-soft: #f7e2e5;
    --shadow: 0 1px 2px rgba(27,26,36,.04), 0 12px 34px -18px rgba(45,32,90,.28);
    --mono: ui-monospace, "Cascadia Code", "Cascadia Mono", "SF Mono", "Segoe UI Mono", Consolas, Menlo, monospace;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #100f16;
      --surface: #191823;
      --surface-2: #201e2c;
      --ink: #ece9f5;
      --muted: #9a95b0;
      --faint: #6a6680;
      --line: #2a2836;
      --accent: #9d86ff;
      --accent-strong: #7c5cff;
      --accent-soft: #241f38;
      --good: #4bbd86;
      --good-soft: #16261f;
      --warn: #e0a24e;
      --warn-soft: #29200f;
      --bad: #e56b7c;
      --bad-soft: #2a161b;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 16px 40px -20px rgba(0,0,0,.6);
    }
  }
  :root[data-theme="light"] {
    --bg: #f6f5fa; --surface: #ffffff; --surface-2: #efedf6; --ink: #1b1a24;
    --muted: #6b6880; --faint: #948fa8; --line: #e4e1ee; --accent: #6d4aff;
    --accent-strong: #512bd4; --accent-soft: #ece7ff; --good: #2f9e69; --good-soft: #e3f3ea;
    --warn: #cf8a2c; --warn-soft: #f7ecd9; --bad: #d1495b; --bad-soft: #f7e2e5;
    --shadow: 0 1px 2px rgba(27,26,36,.04), 0 12px 34px -18px rgba(45,32,90,.28);
  }
  :root[data-theme="dark"] {
    --bg: #100f16; --surface: #191823; --surface-2: #201e2c; --ink: #ece9f5;
    --muted: #9a95b0; --faint: #6a6680; --line: #2a2836; --accent: #9d86ff;
    --accent-strong: #7c5cff; --accent-soft: #241f38; --good: #4bbd86; --good-soft: #16261f;
    --warn: #e0a24e; --warn-soft: #29200f; --bad: #e56b7c; --bad-soft: #2a161b;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 16px 40px -20px rgba(0,0,0,.6);
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  ::selection { background: var(--accent-soft); }

  /* ── Header ─────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .bar {
    max-width: 900px; margin: 0 auto;
    padding: 14px 22px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .wordmark {
    font-family: var(--mono);
    font-weight: 700; font-size: 15px; letter-spacing: -.02em;
    color: var(--ink); white-space: nowrap;
  }
  .wordmark .dot { color: var(--accent); }
  .wordmark .cur { color: var(--accent); animation: blink 1.2s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .spacer { flex: 1 1 auto; }

  .seg {
    display: inline-flex; background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 9px; padding: 3px;
  }
  .seg button {
    font-family: var(--mono); font-size: 12px; letter-spacing: .01em;
    border: 0; background: transparent; color: var(--muted);
    padding: 6px 13px; border-radius: 7px; cursor: pointer;
    transition: color .15s, background .15s;
  }
  .seg button[aria-pressed="true"] {
    background: var(--surface); color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }
  .seg button:hover { color: var(--ink); }

  select.cat {
    font-family: var(--mono); font-size: 12px; color: var(--ink);
    background: var(--surface-2); border: 1px solid var(--line);
    border-radius: 9px; padding: 7px 10px; cursor: pointer;
  }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 9px;
    border: 1px solid var(--line); background: var(--surface-2);
    color: var(--muted); cursor: pointer; transition: color .15s, border-color .15s;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--accent); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ── Progress strip ─────────────────────────────────── */
  .strip {
    max-width: 900px; margin: 0 auto; width: 100%;
    padding: 0 22px;
  }
  .strip-inner {
    display: flex; align-items: center; gap: 18px;
    padding: 10px 0 0; flex-wrap: wrap;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  .track {
    flex: 1 1 160px; height: 5px; border-radius: 3px;
    background: var(--surface-2); overflow: hidden; min-width: 120px;
  }
  .track > i { display: block; height: 100%; background: var(--accent); width: 0; transition: width .4s ease; }
  .stat b { color: var(--ink); font-weight: 700; }
  .stat .u { color: var(--faint); }

  /* ── Main ───────────────────────────────────────────── */
  main {
    flex: 1 1 auto; width: 100%;
    max-width: 900px; margin: 0 auto;
    padding: 22px 22px 40px;
    display: flex; flex-direction: column;
  }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 18px; box-shadow: var(--shadow);
    padding: 30px clamp(22px, 5vw, 44px);
    display: flex; flex-direction: column; min-height: 62vh;
  }
  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise .32s cubic-bezier(.2,.7,.2,1); }
  }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } }

  .card-top {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .chip {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--accent-strong);
    background: var(--accent-soft); border-radius: 999px;
    padding: 5px 11px; font-weight: 600;
  }
  .mastery { display: inline-flex; gap: 5px; align-items: center; margin-left: auto; }
  .mastery .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--line); }
  .mastery .pip.on { background: var(--accent); border-color: var(--accent); }
  .mastery small { font-family: var(--mono); font-size: 10px; color: var(--faint); margin-left: 4px; letter-spacing: .04em; }

  .prompt {
    font-family: var(--mono);
    font-size: clamp(19px, 2.6vw, 25px);
    line-height: 1.4; font-weight: 600; letter-spacing: -.01em;
    color: var(--ink); text-wrap: balance; margin: 0 0 4px;
  }
  .say {
    font-family: var(--sans); font-size: 13px; color: var(--muted);
    margin-top: 16px; display: flex; align-items: center; gap: 8px;
  }
  .say svg { width: 15px; height: 15px; color: var(--accent); flex: none; }

  .grow { flex: 1 1 auto; }

  /* ── Reveal / answer ────────────────────────────────── */
  .answer {
    margin-top: 24px; border-top: 1px dashed var(--line); padding-top: 22px;
  }
  @media (prefers-reduced-motion: no-preference) {
    .answer { animation: fade .3s ease; }
  }
  @keyframes fade { from { opacity: 0; } }
  .answer .lbl {
    font-family: var(--mono); font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--faint); margin-bottom: 10px;
  }
  .prose { font-family: var(--serif); font-size: 16.5px; line-height: 1.62; color: var(--ink); }
  .prose p { margin: 0 0 12px; }
  .prose p:last-child { margin-bottom: 0; }
  .prose strong { font-weight: 700; }
  .prose code {
    font-family: var(--mono); font-size: .84em;
    background: var(--surface-2); border: 1px solid var(--line);
    padding: 1px 5px; border-radius: 5px; color: var(--accent-strong);
  }
  .prose pre {
    font-family: var(--mono); font-size: 13px; line-height: 1.55;
    background: var(--surface-2); border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 13px 15px; margin: 4px 0 14px;
    overflow-x: auto; color: var(--ink);
  }
  .prose pre code { background: none; border: 0; padding: 0; color: inherit; font-size: 13px; }
  .prose ul.notes { margin: 2px 0 14px; padding-left: 1.2em; }
  .prose ul.notes > li { margin: 0 0 9px; padding-left: 4px; }
  .prose ul.notes > li::marker { color: var(--accent); }
  .prose ul.sub { margin: 7px 0 7px; padding-left: 1.1em; list-style: none; }
  .prose ul.sub > li { margin: 0 0 5px; color: var(--muted); font-size: .93em; position: relative; }
  .prose ul.sub > li::before { content: "\2013"; position: absolute; left: -1em; color: var(--faint); }
  .prose .note-h { text-wrap: balance; }
  .prose .note-h2 {
    font-family: var(--mono); font-size: 14px; letter-spacing: .01em; font-weight: 700;
    color: var(--accent-strong); margin: 26px 0 12px; padding-bottom: 7px; border-bottom: 1px solid var(--line);
  }
  .prose .note-h3 {
    font-family: var(--sans); font-size: 12px; text-transform: uppercase; letter-spacing: .09em;
    font-weight: 600; color: var(--muted); margin: 18px 0 7px;
  }
  .notes-doc > .note-h2:first-child { margin-top: 0; }
  .notes-doc { font-size: 15.5px; }
  .notes-doc p { margin: 0 0 11px; }
  .stats-group { display: contents; }
  .stats-note { color: var(--muted); }
  .note-count {
    margin-left: auto; font-family: var(--mono); font-size: 11px;
    color: var(--faint); letter-spacing: .04em; font-variant-numeric: tabular-nums;
  }
  /* Notes flip: front = study notes, back = spoken talking point. */
  @media (prefers-reduced-motion: no-preference) {
    .flip-face { animation: flipIn .34s cubic-bezier(.2,.7,.2,1); transform-origin: center left; }
  }
  @keyframes flipIn { from { opacity: 0; transform: perspective(900px) rotateY(-16deg); } to { opacity: 1; transform: none; } }

  .spoken-face { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; min-height: 38vh; }
  .say-lbl {
    display: flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--accent-strong); font-weight: 600; margin-bottom: 16px;
  }
  .say-lbl svg { width: 14px; height: 14px; flex: none; }
  .spoken-text {
    margin: 0; font-family: var(--serif); font-size: clamp(18px, 2.4vw, 21px); line-height: 1.72;
    color: var(--ink); max-width: 62ch;
  }
  .spoken-text strong { font-weight: 700; }
  .spoken-text code { font-family: var(--mono); font-size: .85em; }

  .flip-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
  .flip-btn svg { width: 15px; height: 15px; flex: none; }
  .btn .hint { opacity: .7; font-family: var(--mono); font-size: 12px; }
  .note-nav { display: grid; grid-template-columns: auto 1fr; gap: 10px; }
  .btn.nav-prev { color: var(--muted); }
  .btn.nav-prev:disabled { opacity: .4; cursor: default; }
  .btn.nav-prev:disabled:hover { border-color: var(--line); }

  /* ── Controls ───────────────────────────────────────── */
  .controls { margin-top: 26px; }
  .btn {
    font-family: var(--sans); font-size: 14px; font-weight: 600;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--ink);
    padding: 13px 20px; border-radius: 11px; cursor: pointer;
    transition: transform .12s, border-color .15s, background .15s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
    width: 100%; font-size: 15px; letter-spacing: .01em;
  }
  :root[data-theme="dark"] .btn.primary,
  .btn.primary { color: #fff; }
  @media (prefers-color-scheme: dark) { .btn.primary { color: #14121c; } }
  :root[data-theme="dark"] .btn.primary { color: #14121c; }
  :root[data-theme="light"] .btn.primary { color: #fff; }
  .btn.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }

  .grade { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .grade button {
    font-family: var(--sans); font-weight: 600; font-size: 14px;
    border-radius: 11px; padding: 13px 8px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--ink);
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: transform .12s, border-color .15s, background .15s;
  }
  .grade button:active { transform: translateY(1px); }
  .grade button .k { font-family: var(--mono); font-size: 10px; color: var(--faint); font-weight: 400; }
  .grade .got:hover { border-color: var(--good); background: var(--good-soft); }
  .grade .got { color: var(--good); }
  .grade .shk:hover { border-color: var(--warn); background: var(--warn-soft); }
  .grade .shk { color: var(--warn); }
  .grade .mis:hover { border-color: var(--bad); background: var(--bad-soft); }
  .grade .mis { color: var(--bad); }

  /* ── Quiz choices ───────────────────────────────────── */
  .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .choice {
    text-align: left; font-family: var(--sans); font-size: 15px; color: var(--ink);
    border: 1px solid var(--line); background: var(--surface); border-radius: 11px;
    padding: 13px 15px; cursor: pointer; display: flex; gap: 12px; align-items: flex-start;
    transition: border-color .15s, background .15s;
  }
  .choice:hover:not(:disabled) { border-color: var(--accent); }
  .choice .key {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 6px; width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center; flex: none;
  }
  .choice.correct { border-color: var(--good); background: var(--good-soft); }
  .choice.correct .key { border-color: var(--good); color: var(--good); }
  .choice.wrong { border-color: var(--bad); background: var(--bad-soft); }
  .choice.wrong .key { border-color: var(--bad); color: var(--bad); }
  .choice:disabled { cursor: default; }
  .explain {
    margin-top: 16px; font-family: var(--serif); font-size: 15.5px; line-height: 1.6;
    color: var(--ink); background: var(--surface-2); border-radius: 10px;
    padding: 14px 16px; border-left: 3px solid var(--accent);
  }
  .explain strong { font-weight: 700; }
  .explain code { font-family: var(--mono); font-size: .85em; background: var(--surface); border: 1px solid var(--line); padding: 1px 5px; border-radius: 5px; color: var(--accent-strong); }

  /* ── Footer ─────────────────────────────────────────── */
  footer {
    max-width: 900px; margin: 0 auto; width: 100%;
    padding: 4px 22px 28px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 11px; color: var(--faint);
  }
  footer kbd {
    font-family: var(--mono); font-size: 10px; background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; color: var(--muted);
  }
  .link {
    background: none; border: 0; color: var(--faint); font-family: var(--mono);
    font-size: 11px; cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
    padding: 0;
  }
  .link:hover { color: var(--bad); }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 8px; }

  @media (max-width: 560px) {
    .bar { padding: 12px 16px; gap: 10px; }
    .strip, main, footer { padding-left: 16px; padding-right: 16px; }
    .card { padding: 24px 18px; min-height: 60vh; }
    .grade button .full { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="bar">
    <span class="wordmark">csharp<span class="dot">.</span>drill<span class="cur">_</span></span>
    <span class="spacer"></span>
    <div class="seg" role="group" aria-label="Study mode">
      <button id="mode-notes" aria-pressed="false">Notes</button>
      <button id="mode-recall" aria-pressed="true">Recall</button>
      <button id="mode-quiz" aria-pressed="false">Quiz</button>
    </div>
    <select class="cat" id="cat" aria-label="Category filter"></select>
    <button class="icon-btn" id="theme" aria-label="Toggle theme" title="Toggle theme"></button>
  </div>
  <div class="strip">
    <div class="strip-inner">
      <span id="stats-progress" class="stats-group">
        <span class="stat"><b id="s-mastered">0</b><span class="u"> / <span id="s-total">0</span> mastered</span></span>
        <span class="stat">deck <b id="s-pos">0</b><span class="u">/<span id="s-deck">0</span></span></span>
        <div class="track" aria-hidden="true"><i id="bar"></i></div>
        <span class="stat">streak <b id="s-streak">0</b></span>
      </span>
      <span id="stats-notes" class="stats-note" style="display:none"></span>
    </div>
  </div>
</header>

<main>
  <div class="card" id="card"><!-- rendered --></div>
</main>

<footer>
  <span id="fkeys"></span>
  <span class="spacer" style="flex:1"></span>
  <button class="link" id="reset">reset progress</button>
</footer>

<script>
(function () {
  "use strict";

  /* ════════════════════════════════════════════════════════
     QUESTION BANK  — seeded from Zulhilmi's interview prep.
     Grow it: add objects to RECALL or QUIZ.
     Answer/explain markup: **bold**, `inline code`, ```code block```
     ════════════════════════════════════════════════════════ */

  var CATS = {
    behav: "Behavioral & Fit",
    lang:  "C# Language",
    oop:   "OOP & SOLID",
    async: "Async & Threading",
    linq:  "LINQ & Collections",
    data:  "EF Core & ORM",
    sql:   "SQL & Databases",
    k8s:   "Kubernetes & DevOps",
    azure: "Azure & Cloud",
    design:"System Design",
    exp:   "Experience & STAR"
  };

  var RECALL = [
    { id:"r-valref", cat:"lang",
      prompt:"Value types vs reference types — what's the real difference, and why does it matter?",
      a:"A **value type** (struct, int, bool, enum, `DateTime`) holds its data directly. Assign it or pass it to a method and you copy the whole value — the callee gets its own independent copy, so changes it makes are **not** seen by the caller.\n\nA **reference type** (class, string, array, most things) holds a reference to an object on the heap. Assign or pass it and you copy the *reference* — both variables point at the **same object**, so a change through one is seen by the other.\n\n```csharp\nvoid Bump(Point p) { p.X++; }   // struct: caller unchanged\nvoid Bump(Order o) { o.Total++; } // class: caller sees it\n```\n\nThe practical tell: \"does the caller see my change?\" Value = no, reference = yes. Watch the gotcha that `string` is a *reference* type but behaves value-like because it's immutable." },

    { id:"r-crs", cat:"lang",
      prompt:"class vs record vs struct — when do you reach for each?",
      a:"**class** — reference type, identity-based equality (two objects are equal only if they're the same instance). The default for most things: services, entities, anything with behavior.\n\n**record** — still a reference type, but the compiler gives you **value-based equality** (equal if all members match), `with`-expressions for non-destructive copies, and a nice `ToString`. Reach for it for **immutable data / DTOs** — an API response, a value object.\n\n**struct** — value type, copied on assignment, lives on the stack (no heap allocation). Use for **small, short-lived values** where copying is cheap — a coordinate, a money amount. Keep them small and ideally immutable, or copying semantics bite you.\n\nOne line: *class for behavior and identity, record for immutable data, struct for small cheap values.*" },

    { id:"r-var", cat:"lang",
      prompt:"var — what is it, and when is it a bad idea?",
      a:"`var` is **implicit typing**: the compiler infers the static type from the right-hand side. It's still strongly typed — `var x = 5;` is exactly `int x = 5;`, just less to type. No runtime cost, no dynamic behaviour.\n\nGood when the type is obvious from the RHS (`var user = new User();`) or genuinely unspeakable (LINQ anonymous types).\n\nBad when it *hides* the type and hurts readability — `var result = Process(data);` tells a reader nothing. Rule of thumb: use `var` when the type is on the line already, spell it out when it isn't." },

    { id:"r-pillars", cat:"oop",
      prompt:"The four pillars of OOP — name them and give a one-line 'why' for each.",
      a:"**Encapsulation** — bundle data with the methods that guard it, and hide the internals behind a public surface. Why: callers can't put the object in an invalid state.\n\n**Abstraction** — expose *what* something does, hide *how*. Why: you can swap the implementation without touching callers (this is what enables Dependency Inversion).\n\n**Inheritance** — a subclass reuses and extends a base. Why: share common behaviour — but favour composition; deep inheritance trees get brittle.\n\n**Polymorphism** — one interface, many implementations chosen at runtime. Why: it replaces `switch`/`if` chains with a virtual call, which is what makes code Open/Closed." },

    { id:"r-solid", cat:"oop",
      prompt:"Walk me through SOLID.",
      a:"Five principles all pointing at one goal — **change code safely**.\n\n**S — Single Responsibility.** One reason to change; better, answer to one stakeholder. If finance, the DBA and HR can each demand a change to the same class, split it.\n\n**O — Open/Closed.** Add behaviour by writing new code, not editing tested code. In practice: replace a conditional with polymorphism — a new `IPaymentProcessor` instead of another branch in a payment `switch`.\n\n**L — Liskov.** A subtype must be usable anywhere its base is, *behaviourally* — can't demand more, promise less, or throw what the base doesn't. Tell: calling code needing an `is` check.\n\n**I — Interface Segregation.** No client depends on methods it doesn't use. `NotImplementedException` in an impl means the interface is too fat. It's SRP for interfaces.\n\n**D — Dependency Inversion.** Policy and detail both depend on an abstraction owned by the policy side. `IOrderRepository` lives with the domain; `SqlOrderRepository` points up at it." },

    { id:"r-dip", cat:"oop",
      prompt:"Dependency Inversion specifically — and how is it different from Dependency Injection?",
      a:"**DIP has two halves:** high-level modules shouldn't depend on low-level ones — both depend on abstractions; and abstractions shouldn't depend on details — details depend on abstractions.\n\nThe word *inversion*: normally the arrow runs from business logic **down** to plumbing (`OrderService → SqlOrderRepository`). DIP flips it — the plumbing points **up** at an abstraction that lives with the business logic:\n\n```\nOrderService → IOrderRepository ← SqlOrderRepository\n  (domain)        (domain)          (infrastructure)\n```\n\nThe insight most people miss: **the interface is owned by the consumer, not the provider.** Infrastructure references the domain, never the reverse. Your domain doesn't know SQL exists.\n\n**DIP ≠ DI.** Dependency Injection is just a *technique* to achieve it. You can use a DI container and still violate DIP — e.g. injecting concrete classes, or making the domain reference EF Core to define the interface." },

    { id:"r-liskov", cat:"oop",
      prompt:"Explain Liskov Substitution — and give a real example of a violation.",
      a:"A subtype must be usable **anywhere** its base is, and the point is it's about **behaviour, not compiling** — the compiler already guarantees the type fits. Liskov is the promise it also *behaves* right, so the caller never has to know which subtype it got.\n\nA subtype must not: demand more than the base (stronger preconditions), promise less (weaker postconditions), throw exceptions the base doesn't, or break its invariants.\n\n**The tell:** calling code that needs `if (x is SomeSubtype)`, or a `catch` for one subtype only.\n\n**Real one from .NET itself:**\n```csharp\nIList<int> list = new[] {1,2,3};  // arrays implement IList<T>\nlist.Add(4);   // NotSupportedException at runtime\n```\nAn array is a fixed-size `IList<T>` that throws on `Add` — a shipped Liskov violation, and exactly why `IReadOnlyList<T>` was added." },

    { id:"r-di-life", cat:"oop",
      prompt:"AddScoped vs AddSingleton vs AddTransient — and why is Scoped different from Transient?",
      a:"They're the three DI **lifetimes** — how long the container keeps one instance:\n\n**Singleton** — one instance for the whole app. Good for stateless/shared things (a clock, config, a cache). Must be thread-safe.\n\n**Scoped** — one instance **per scope**, which in ASP.NET Core means **per HTTP request**. Everything in that one request shares it; the next request gets a fresh one. This is where `DbContext` lives.\n\n**Transient** — a **new instance every time** it's asked for, even twice within the same request. For cheap, stateless helpers.\n\n**Scoped vs Transient:** within a single request, Scoped hands out the *same* object to every dependency that needs it; Transient hands out a *new* one each time. That's why a Scoped `DbContext` lets several services share one unit-of-work and transaction — Transient would give each its own." },

    { id:"r-async", cat:"async",
      prompt:"What does async/await actually do — and what does it NOT do?",
      a:"`await` on an I/O operation (a DB call, an HTTP request) **releases the current thread back to the thread pool** while the I/O is in flight, then resumes your method when the result is ready. The compiler rewrites the method into a state machine to make that pause/resume work.\n\nWhat it buys you: **throughput / scalability**. That thread can go serve other requests instead of blocking. A server handling 1000 concurrent requests doesn't need 1000 threads parked on the DB.\n\n**What it does NOT do:** make any single call faster. An `await`ed query that takes 200ms still takes 200ms — you haven't sped it up, you've just stopped wasting a thread while you wait. Async is about *doing more at once*, not *doing one thing quicker*.\n\nGotcha to name: never `.Result`/`.Wait()` on async code — it blocks the thread you were trying to free, and can deadlock." },

    { id:"r-taskthread", cat:"async",
      prompt:"Task vs Thread — and what does 'improves throughput, not the speed of a single call' mean?",
      a:"A **Thread** is an actual OS thread — expensive (≈1MB stack), you manage its life. A **Task** is a higher-level *promise of future work* that runs on the shared **thread pool**; the runtime schedules it. You almost always want `Task`.\n\n**\"Improves throughput, not single-call speed\":** imagine a waiter (a thread). If they stand at one table waiting for the kitchen, one table is served slowly and everyone else waits. Async is the waiter taking other tables' orders while the kitchen cooks — the first meal doesn't arrive any sooner (*same single-call speed*), but far more tables get served in the same hour (*higher throughput*).\n\nOn a server, threads are the waiters. Freeing one during I/O means the same pool serves many more concurrent requests — you scale, you don't accelerate the individual request." },

    { id:"r-ienum", cat:"linq",
      prompt:"IEnumerable vs IQueryable — what's the difference and why care?",
      a:"**`IEnumerable<T>`** represents an in-memory sequence. LINQ over it runs as **LINQ-to-Objects** — the filtering happens in your app, in C#.\n\n**`IQueryable<T>`** represents a query that hasn't run yet. LINQ over it builds an **expression tree** that a provider (EF Core) **translates to SQL** and runs in the database.\n\nWhy it matters — the classic bug:\n```csharp\ndb.Orders.Where(o => o.Total > 100)   // IQueryable → WHERE in SQL ✅\ndb.Orders.ToList().Where(o => o.Total > 100) // IEnumerable → pulls ALL rows, filters in memory ❌\n```\nCall `ToList()`/`AsEnumerable()` too early and you drag the whole table across the wire, then filter in C#. Keep it `IQueryable` until the database has done all the work it can." },

    { id:"r-deferred", cat:"linq",
      prompt:"Deferred execution in LINQ — what is it and where does it bite people?",
      a:"Most LINQ operators (`Where`, `Select`, `OrderBy`) are **lazy** — they don't run when you write them, they build a pipeline. Execution happens only when you **enumerate**: `foreach`, `ToList()`, `Count()`, `First()`.\n\nTwo bites:\n\n**Multiple enumeration** — if you hold a query in a variable and enumerate it twice, the work (and the DB round-trip) happens **twice**. Materialise once with `ToList()` if you'll reuse it.\n\n**Captured variables / closures** — the query reads the variable's value at *execution* time, not definition time. Change it in a loop before enumerating and you get surprises.\n\nOne line: LINQ describes work; enumeration performs it — know which line actually hits the database." },

    { id:"r-dbcontext", cat:"data",
      prompt:"EF Core DbContext — what is it, and why is its lifetime Scoped?",
      a:"`DbContext` is EF Core's **unit of work + identity map**. It represents a session with the database: it tracks the entities you've loaded, records the changes you make, and on `SaveChanges()` writes them all in **one transaction**. Its `DbSet<T>` properties are your queryable tables.\n\n**Change tracking:** load an entity, mutate a property, call `SaveChanges()` — EF diffs against the snapshot it kept and generates the `UPDATE`. No explicit save-per-field.\n\n**Why Scoped (per request):** it's a lightweight, **not thread-safe**, short-lived session. One per HTTP request means all the services in that request share one unit-of-work and one transaction boundary. Singleton would be a threading disaster and a memory leak (the change tracker grows forever); Transient would fragment your transaction across contexts." },

    { id:"r-pgsql", cat:"data",
      prompt:"PostgreSQL vs SQL Server — how would you compare them?",
      a:"Both are mature relational databases; day to day with EF Core the app code barely changes — you swap the provider (`UseNpgsql` vs `UseSqlServer`).\n\n**PostgreSQL** — open-source, no licensing cost, famously strong on standards compliance and rich types: first-class **`JSONB`**, arrays, powerful indexing (GIN/GiST), great extensibility. Very popular in cloud-native / container stacks.\n\n**SQL Server** — Microsoft's, deep .NET/Windows/Azure integration, excellent tooling (SSMS), strong enterprise support; licensing cost is the trade-off.\n\nHonest positioning for me: my production data work has been **MySQL and SQL Server**, and I'm comfortable on the relational fundamentals — schema design, indexing, transactions, query tuning — which transfer directly. Picking up Postgres specifics like `JSONB` is a small step, not a relearn." },

    { id:"r-nplus1", cat:"data",
      prompt:"What's the N+1 query problem and how do you fix it?",
      a:"You load N parent rows, then lazily access a navigation property in a loop — so EF fires **1 query for the parents + N queries** for each parent's children. 100 orders becomes 101 round-trips. It's the most common EF performance killer and it hides in code that looks innocent.\n\n**Fixes:**\n- **Eager load** with `.Include(o => o.Lines)` so it's one query with a join.\n- **Projection** — `.Select(o => new { o.Id, LineCount = o.Lines.Count })` to pull only what you need.\n- Watch out for lazy loading being on by default in some setups — that's what silently triggers it.\n\nHow you'd catch it: turn on EF query logging and watch for a burst of identical parameterised queries." },

    { id:"r-k8s", cat:"k8s",
      prompt:"Explain Kubernetes to me — pod, deployment, service.",
      a:"Kubernetes is a **container orchestrator** — it runs your containers across a cluster of machines and keeps them in the state you declared.\n\n**Pod** — the smallest deployable unit: one (or a few tightly-coupled) containers sharing a network address. Pods are disposable — they come and go.\n\n**Deployment** — the declarative controller: \"I want 3 replicas of this image.\" It creates the pods, replaces ones that die, and handles **rolling updates** (spin up new, drain old) and rollbacks. You edit desired state; K8s reconciles reality to it.\n\n**Service** — a stable network endpoint (a fixed name + virtual IP) in front of a changing set of pods. Because pods are ephemeral and their IPs churn, the Service gives clients one address and **load-balances** across the healthy pods behind it.\n\nThe throughline: you declare *desired state*, the control loop continuously makes *actual state* match." },

    { id:"r-probes", cat:"k8s",
      prompt:"Readiness, liveness, and startup probes — what's the difference?",
      a:"Three health checks Kubernetes runs against your container, answering different questions:\n\n- **Readiness** — *'can it take traffic right now?'* If it fails, K8s pulls the pod out of the Service endpoints but does **not** restart it. For startup warm-up or a temporarily-down dependency.\n- **Liveness** — *'is it still healthy, or wedged?'* If it fails, K8s **kills and restarts** the container. For recovering from hangs/deadlocks.\n- **Startup** — for slow-booting apps: holds the other two off until the app has finished starting, so a slow boot isn't mistaken for a failure.\n\n**Quick tell:** READY 0/1 → **readiness**; a climbing RESTARTS count → **liveness** (or a crash). Point the readiness probe at a lightweight health endpoint that checks your real dependencies." },

    { id:"r-broker", cat:"design",
      prompt:"RabbitMQ vs Kafka — when would you pick each?",
      a:"Both move messages between services, but they're built on different models:\n\n**RabbitMQ** — a traditional **message broker / queue**. A message is delivered to a consumer and, once acknowledged, it's **gone**. Rich routing (exchanges, routing keys), great for **task/work queues** and request-style workloads — \"process this payment,\" \"send this email.\"\n\n**Kafka** — a **distributed, append-only log**. Messages are **retained** for a configured window, and consumers track their own offset — so multiple consumers can read the same stream independently and you can **replay** from any point. Built for **high-throughput event streaming**, event sourcing, feeding analytics.\n\nRule of thumb: *\"do this task\" → RabbitMQ; \"this happened, and others may care now or later\" → Kafka.* Kafka for durable replayable streams, Rabbit for routed work queues." },

    { id:"r-idem", cat:"design",
      prompt:"At-least-once delivery and idempotency — why do they go together?",
      a:"Most brokers guarantee **at-least-once** delivery: to be sure a message isn't lost, they'll redeliver if they don't get an ack — which means a consumer can receive the **same message more than once** (a retry, a network blip, a redeploy mid-processing).\n\nSo the consumer **must be idempotent**: processing the same message twice must have the **same effect as processing it once**. Otherwise you double-charge a card or issue a policy twice.\n\n**How you make it idempotent:**\n- Give each message a stable **unique key** (message id / business key).\n- Before acting, check whether that key was already processed — a **dedup table** or a unique DB constraint.\n- Do the check-and-write **atomically** (a transaction / an upsert) so two concurrent copies can't both slip through.\n\nOne line: at-least-once means duplicates *will* happen, so correctness has to live in the consumer, not the broker." },

    { id:"r-star", cat:"exp",
      prompt:"STAR: tell me about a hard production problem you solved.",
      a:"**Situation** — On the insurance platform at Senang, issuance ran off asynchronous messages. Under load and retries we saw **duplicate policy issuance** — the same request occasionally produced two policies, which is a real financial and compliance problem.\n\n**Task** — Make issuance safe under at-least-once delivery without losing throughput.\n\n**Action** — I made the consumer **idempotent**: each issuance request carried a stable business key; before issuing I checked that key against a dedup record, and I did the check-and-insert **atomically in one transaction** with a unique constraint as the backstop, so two concurrent retries couldn't both succeed. I added retry/recovery around the payment callbacks and reconciliation to catch anything that slipped.\n\n**Result** — Duplicate issuance stopped; retries became safe by design rather than by luck, and the same pattern carried over to the payment flows (FPX, QR, card via PayNet)." },

    { id:"r-why", cat:"exp",
      prompt:"Why do you want to go back to C#/.NET after years in Angular/Node?",
      a:"I'll be honest about the timeline: my heaviest hands-on .NET was 2018 to 2023, and recently I've been leading Angular and Node work. But two things make this a *return*, not a leap.\n\nFirst, the **fundamentals never left** — the OOP and SOLID thinking, async, DI, clean layering — I've been applying every one of those in TypeScript daily. The mental model is identical; it's the syntax I'm refreshing, not the concepts.\n\nSecond, it's a **deliberate choice**. Strongly-typed, backend-heavy, transactional systems are the work I do best and enjoy most — the payments and issuance work I'm proudest of is exactly that shape. .NET is where I want to go deep again, and I've been actively rebuilding the muscle memory rather than waiting to be handed it." },

    { id:"b-about", cat:"behav",
      prompt:"Tell me about yourself.",
      a:"**Frame it Now → Past → Why here. Aim for ~90 seconds, then stop and let them dig in.**\n\n- **Now** — full-stack engineer, ~9 years; currently leading front-end and Node.js at Senang.io, an insurtech; I run a cross-functional team of 9 and mentor 3 junior developers\n- **Past** — my heaviest hands-on .NET was 2018–2023: backend, APIs, transactional systems; that's the foundation everything since is built on\n- **What I'm known for** — payments and insurance: shipped the Touch 'n Go eWallet Mini Program, built FPX / QR / card flows via PayNet, and made policy issuance safe under retries with idempotency and reconciliation\n- **Why here** — I'm deliberately coming back to .NET and backend; the strongly-typed, transactional work is what I do best and enjoy most, and this role is exactly that\n- *End on the role, not on yourself — it invites the next question.*" },

    { id:"b-leave", cat:"behav",
      prompt:"Why are you looking to leave / why are you on the market?",
      a:"**Stay positive — never bad-mouth Senang. Frame it as moving toward something, not away.**\n\n- Grateful for the growth here: I led a cross-functional team end-to-end and owned payments from design to production\n- What I'm looking for next: deeper backend and .NET focus, and a bigger technical challenge in a product I can grow with\n- This is about direction, not escape — I want to go deep in the work I'm strongest at\n- *If pushed on negatives, keep it about fit and growth, never people or grievances.*" },

    { id:"b-whyrole", cat:"behav",
      prompt:"Why this role / why do you want to work here?",
      a:"**Tie your genuine motivation to something specific about them.**\n\n- Honest core: my strongest, most enjoyable work is strongly-typed backend and transactional systems — this role is squarely that\n- The fundamentals never left me — OOP, SOLID, async, DI — I apply them daily in TypeScript, so this is a refresh, not a relearn\n- It's a deliberate choice to return to .NET, and I've been actively rebuilding the muscle memory\n- **Company hook** — connect to their domain/product (e.g. for a stockbroking or SaaS firm: real-money, reliability-critical systems are exactly the shape of work I'm proud of)\n- *Do 5 minutes of homework on the company so this line is specific, not generic.*" },

    { id:"b-strength", cat:"behav",
      prompt:"What's your greatest strength?",
      a:"**Pick one strength, back it with a concrete result.**\n\n- Shipping reliable systems in high-stakes domains — payments and insurance, where 'mostly works' isn't acceptable\n- Proof: I made policy issuance idempotent so retries were safe **by design, not by luck** — killed duplicate issuance\n- Bonus dimension: I bridge engineering and business — leading a team of 9 across dev, BA, QA and DevOps, I translate between them and the code\n- *One strength told well beats three listed.*" },

    { id:"b-weak", cat:"behav",
      prompt:"What's your biggest weakness?",
      a:"**Give a real one + what you're actively doing about it. Avoid humble-brags like 'I work too hard'.**\n\n- I've tended to hold too much context myself instead of delegating — it comes from caring about production safety\n- What I'm doing about it: mentoring 3 juniors, writing things down, and deliberately letting the team own more\n- The payoff: I've grown from a strong individual contributor into more of a **multiplier** for the team\n- *The structure matters more than the flaw: real weakness → concrete action → result.*" },

    { id:"b-lead", cat:"behav",
      prompt:"Describe your leadership style / a time you led a team.",
      a:"**Show ownership and how you grow people, not just that you 'managed'.**\n\n- I lead a team of 9 — developers, business analysts, QA and DevOps — and mentor 3 juniors directly\n- Style: lead by example on code quality and production safety first, then hand over real ownership\n- Concrete: I coached the juniors on writing safe, idempotent code and reviewing for edge cases before they hit production\n- Outcome: the team shipped payments and issuance to production reliably, and the juniors grew into owning their areas" },

    { id:"b-conflict", cat:"behav",
      prompt:"Tell me about a conflict or disagreement at work.",
      a:"**Pick a technical disagreement resolved with data, not ego. STAR-shaped.**\n\n- **Situation** — a disagreement on handling duplicate messages: a quick patch versus doing proper idempotency\n- **Action** — I laid out the actual failure case (double issuance = a financial and compliance risk), proposed the atomic check-and-write, and we agreed on a plan together\n- **Result** — we shipped the robust fix; the relationship stayed good because I kept it about the risk, not about who was right\n- *The lesson to voice: disagree on the idea, align on the goal.*" },

    { id:"b-fail", cat:"behav",
      prompt:"Tell me about a failure or mistake.",
      a:"**Own a real one, then show the lesson and the safeguard. Never 'I have no failures'.**\n\n- Take a genuine production issue — e.g. an assumption about retries I didn't fully verify up front, which surfaced under load\n- What I did: fixed it, then added the safeguard (idempotency + monitoring) and turned it into a **reusable pattern** so it couldn't recur\n- Lesson: design for the failure case from the start, especially in money-handling code\n- *Interviewers want accountability + growth, not a spotless record.*" },

    { id:"b-5yr", cat:"behav",
      prompt:"Where do you see yourself in 5 years?",
      a:"**Show ambition that grows WITH the company, not past it.**\n\n- Growing into a senior/lead .NET engineer with deep backend and architecture ownership\n- Ideally technical leadership — mentoring, setting standards — **without leaving code behind**\n- Staying in domains where reliability matters (fintech / insurance)\n- *Avoid 'I want your job' or anything that sounds like a stepping stone.*" },

    { id:"b-hireyou", cat:"behav",
      prompt:"Why should we hire you?",
      a:"**A tight closing pitch — 4 beats, confident, not arrogant.**\n\n- 9 years shipping real, high-stakes systems end-to-end\n- Strong fundamentals that transfer directly to .NET, plus proven delivery in payments and insurance\n- I lead technically and mentor — I lift the whole team, not just my own output\n- Genuinely motivated to go deep in .NET — this is the direction I chose, not a fallback" },

    { id:"b-salary", cat:"behav",
      prompt:"What are your salary expectations?",
      a:"**Deflect gently if it's early; anchor on value; never undersell.**\n\n- If asked too early: 'I'd like to understand the role and scope first, but I'm confident we can land on something fair'\n- If pushed: give a **researched range** based on market rate and your 9 years — keep it a range, not a single number\n- Anchor on the value you deliver, and signal you're flexible for the right fit\n- **Know your floor beforehand** so you never get talked below it\n- *For a recruiter's first screen, a range is expected — it saves everyone's time.*" },

    { id:"b-questions", cat:"behav",
      prompt:"Do you have any questions for us?",
      a:"**Always have 3–4 ready. Asking good questions is itself a strong signal.**\n\n- What does success in this role look like in the first 6–12 months?\n- What's the team structure, and the tech stack in practice — .NET version, cloud, CI/CD?\n- How does the team handle testing, code review and production reliability?\n- What are the biggest technical challenges the team is facing right now?\n- *Pick based on who you're talking to — a manager gets team/role questions, an engineer gets technical ones.*" },

    { id:"b-pressure", cat:"behav",
      prompt:"How do you handle pressure or tight deadlines?",
      a:"**Show a system, not just 'I stay calm'.**\n\n- Prioritise ruthlessly — separate what genuinely must ship from what can wait\n- Communicate early — flag risk before it's a fire, not after\n- Lean on process — safe deploys and tests, so speed doesn't cost reliability\n- Example: launching payments under a deadline, I protected correctness (idempotency) while keeping pace" },

    { id:"s-acid", cat:"sql",
      prompt:"What does ACID stand for?",
      a:"**The four guarantees a transaction gives you.**\n\n- **Atomicity** — all-or-nothing: every statement commits, or none does. A failed transfer never debits without crediting.\n- **Consistency** — a transaction moves the DB from one valid state to another; constraints (FKs, checks) are never left violated.\n- **Isolation** — concurrent transactions don't step on each other; the result is as if they ran in sequence (to the degree set by the isolation level).\n- **Durability** — once committed, it survives a crash or power loss (written to the log/disk).\n\nOne-liner: *atomicity is about this transaction, isolation is about concurrent ones, durability is about after commit.*" },

    { id:"s-tx", cat:"sql",
      prompt:"What is a transaction and when do you reach for one?",
      a:"A **transaction** groups multiple statements into one atomic unit — they all succeed or all roll back.\n\n- Classic example: a money transfer = debit one account **and** credit another. If the credit fails, the debit must roll back or money vanishes.\n- `BEGIN TRAN … COMMIT / ROLLBACK`; in EF Core, `SaveChanges()` wraps all tracked changes in one transaction automatically.\n- Reach for one whenever a **multi-step write must stay consistent** — payments, issuance, anything money-touching.\n- This is exactly what made my idempotent issuance safe: the check-and-insert ran as **one atomic transaction**, so two retries couldn't both slip through." },

    { id:"s-isolation", cat:"sql",
      prompt:"Isolation levels — name them and the read phenomena they prevent.",
      a:"Isolation level = how much concurrent transactions may interfere. Higher isolation = more correctness, less concurrency.\n\n- **Read Uncommitted** — can see others' uncommitted changes (**dirty reads**). Fastest, least safe.\n- **Read Committed** — only sees committed data. Prevents dirty reads. *(Default in SQL Server & Postgres.)*\n- **Repeatable Read** — rows you've read won't change if you re-read them.\n- **Serializable** — full isolation, as if transactions ran one at a time. Safest, most locking.\n\n**The three phenomena to name:**\n- **Dirty read** — you see uncommitted data.\n- **Non-repeatable read** — a row you re-read has changed.\n- **Phantom read** — new rows appear matching your `WHERE` on a re-run.\n\nEach step up removes one more." },

    { id:"s-index", cat:"sql",
      prompt:"What is an index — clustered vs non-clustered, and the trade-off?",
      a:"An **index** is a sorted structure (usually a B-tree) that lets the DB find rows without scanning the whole table — like the index at the back of a book.\n\n- **Clustered** — defines the physical order of the rows; **one per table** (usually the primary key). The table *is* the index.\n- **Non-clustered** — a separate structure pointing back to the rows; you can have many.\n- **The trade-off:** indexes make reads and lookups fast but **slow down writes** (every insert/update must maintain them) and cost storage. Index the columns you filter, join, and sort on — not everything.\n\nThe tell for a missing index: a query doing a full **table scan** on a large table." },

    { id:"s-joins", cat:"sql",
      prompt:"Explain the types of JOIN.",
      a:"Joins combine rows from two tables on a matching condition.\n\n- **INNER JOIN** — only rows with a match in **both** tables.\n- **LEFT (OUTER) JOIN** — all rows from the left, plus matches from the right; `NULL` where no match.\n- **RIGHT JOIN** — mirror of LEFT (rare; usually rewritten as LEFT).\n- **FULL OUTER JOIN** — everything from both sides, `NULL` where no match.\n- **CROSS JOIN** — every combination (Cartesian product); usually a bug if unintended.\n\nThe one they love to probe — *'customers with no orders'*:\n```sql\nSELECT c.* FROM Customers c\nLEFT JOIN Orders o ON o.CustomerId = c.Id\nWHERE o.Id IS NULL;\n```" },

    { id:"s-keys", cat:"sql",
      prompt:"Primary key vs foreign key vs unique constraint.",
      a:"- **Primary key** — uniquely identifies each row; not null, one per table, often the clustered index.\n- **Foreign key** — a column referencing another table's PK; enforces **referential integrity** (can't reference an order that doesn't exist, can't orphan child rows on delete).\n- **Unique constraint** — guarantees no duplicates in a column; unlike a PK it can allow a NULL and you can have several per table.\n\nReal use for me: a **unique constraint is the last-line backstop for idempotency** — even if two retries race past the app-level check, the DB refuses the second insert." },

    { id:"s-deadlock", cat:"sql",
      prompt:"What's a deadlock and how do you avoid it?",
      a:"A **deadlock** is when two transactions each hold a lock the other needs, so neither can proceed — the DB detects it and kills one as the 'victim'.\n\n- Classic cause: A locks row 1 then wants row 2; B locks row 2 then wants row 1.\n- **Avoid it by:**\n  - accessing tables/rows in a **consistent order** everywhere\n  - keeping transactions **short** and holding locks briefly\n  - not over-locking (right isolation level for the job)\n- **Handle it:** catch the deadlock error and **retry** the transaction — which is safe precisely because the work is idempotent." },

    { id:"s-lock", cat:"sql",
      prompt:"Optimistic vs pessimistic locking — when each?",
      a:"Two strategies for concurrent updates to the same row:\n\n- **Pessimistic** — lock the row on read so nobody else can touch it until you're done. Safe, but hurts concurrency and risks deadlocks. Good when **conflicts are frequent**.\n- **Optimistic** — don't lock; keep a **version / timestamp** column and, on update, check it hasn't changed since you read it. If it did, reject and retry. Good when **conflicts are rare** (most web apps).\n\nEF Core does optimistic concurrency with a `[Timestamp]` / rowversion column — the `UPDATE` gets `WHERE Version = @original`, and **0 rows affected** means someone beat you to it (`DbUpdateConcurrencyException`)." },

    { id:"s-optimize", cat:"sql",
      prompt:"A query is slow. How do you optimise it?",
      a:"**Read the execution plan first — don't guess.**\n\n- Check the **query/execution plan** to see where the time goes: table scans, expensive sorts, nested loops over big sets.\n- Add or fix **indexes** on the columns in `WHERE` / `JOIN` / `ORDER BY`.\n- Select **only the columns you need** — avoid `SELECT *`; it defeats covering indexes and drags data.\n- Watch for **N+1** from the ORM, **functions on indexed columns** (`WHERE YEAR(date)=…` can't use the index), and implicit type conversions.\n- Only after the query itself is tight do you consider **denormalising or caching**." },

    { id:"s-nosql", cat:"sql",
      prompt:"SQL vs NoSQL — when would you pick each?",
      a:"- **SQL (relational)** — structured schema, relationships, and **ACID transactions**. Pick it when data is relational and correctness matters — payments, orders, anything financial. This is my default and my strength.\n- **NoSQL** — a family, not one thing:\n  - **Document** (MongoDB) — flexible/nested schema, fast reads of whole documents\n  - **Key-value** (Redis) — caching, sessions, blazing lookups\n  - **Wide-column / graph** — scale or relationship-heavy traversal\n- Trade-off: NoSQL buys flexibility and horizontal scale, often at the cost of strong consistency and joins.\n\nHonest rule of thumb: *relational + transactional → SQL; huge scale, flexible shape, or caching → NoSQL.* Many real systems use both." },

    { id:"k-diagnose", cat:"k8s",
      prompt:"How do you approach any Kubernetes pod issue?",
      a:"**The same three-command reflex for almost any pod problem.**\n\n- `kubectl get pods` first — check the status and the **READY** count.\n- `kubectl describe pod <name>` — read the **Events** at the bottom; that's where Kubernetes narrates what it's doing.\n- `kubectl logs <name>` (add `--previous` if it crashed) — the app's own side of the story.\n\nExample: `get pods` shows a pod stuck at **0/1 Ready**, `describe` shows a failing readiness probe, and the logs show it can't reach the database — so the real fix is the DB connection, not the pod." },

    { id:"k-describe-logs", cat:"k8s",
      prompt:"For a missing secret vs an unreachable port — describe or logs?",
      a:"**Rule of thumb: if the container never started, it's in `describe`. If it started then failed, it's in the `logs`.**\n\n- `describe` = Kubernetes's view *around* the container: scheduling, image pull, mounting secrets, probe results.\n- `logs` = the app's own output from *inside*.\n- A **missing** secret shows in `describe` as `CreateContainerConfigError` — the container never starts, so there are no logs yet.\n- A secret that exists with the **wrong** value shows in the **logs** as an auth exception — the app started, then threw." },

    { id:"k-502", cat:"k8s",
      prompt:"Users get a 502 and a pod shows READY 0/1. What's happening?",
      a:"- READY 0/1 means the **readiness probe is failing**.\n- A not-Ready pod is pulled out of the Service's endpoints. If **no** pods are Ready, the Service has nothing to route to, and the ingress returns a **502**.\n- Quick confirm: `kubectl get endpoints <service>` — if it's empty, that's your answer.\n\nClassic after a bad deploy: every pod sits at 0/1 because the readiness endpoint returns 500, `get endpoints` is empty, and you serve 502s until the app goes Ready." },

    { id:"k-running-ready", cat:"k8s",
      prompt:"What's the difference between Running and Ready?",
      a:"- **Running** — the container process has started.\n- **Ready** — the readiness probe passes, so it's *allowed to take traffic*.\n\nThe gap matters: a pod can be **Running but not Ready** while it's still warming up, or while a dependency is down. Right after startup it might sit at 0/1 for a while; it only joins the Service and receives traffic once readiness passes." },

    { id:"k-crashloop", cat:"k8s",
      prompt:"A pod is in CrashLoopBackOff. What does it mean and what do you do?",
      a:"**The app starts, dies, and K8s keeps restarting it with a growing back-off delay.**\n\n- Usual causes: bad config, a missing env var, or an exception on boot.\n- First move: `kubectl logs --previous` — shows the crash from the *last* attempt, not the fresh one.\n- Typical find: a `NullReference`/config error right at startup, which points straight at the misconfiguration." },

    { id:"k-imagepull", cat:"k8s",
      prompt:"A pod is in ImagePullBackOff. Cause and fix?",
      a:"**Kubernetes can't pull the image.**\n\n- Either the **tag/name is wrong**, or it's a **registry auth** problem.\n- `describe` shows the pull error in the Events (e.g. `manifest not found` for a bad tag, like a typo in `latest`).\n- Fix the tag; if it's auth, check the `imagePullSecret`." },

    { id:"k-pending", cat:"k8s",
      prompt:"A pod is stuck Pending. What's wrong?",
      a:"**It can't be scheduled yet.**\n\n- Usually no node has enough CPU/memory, or a volume claim is unbound.\n- `describe` shows it in the Events, e.g. *'0/3 nodes available: insufficient memory'*.\n- Once a node frees up (another workload scales down, or you add capacity), it schedules immediately." },

    { id:"k-oom", cat:"k8s",
      prompt:"A container was OOMKilled. What happened?",
      a:"**It hit its memory limit and the kernel killed it.**\n\n- `describe` confirms it — you'll see `OOMKilled` in **Last State**.\n- Typical cause: a service with, say, a 256Mi limit processing a payload bigger than it can hold. Fix by raising the limit *and* trimming how much it holds in memory at once.\n- Ties to limits: exceed the **memory** limit → OOMKilled; exceed **CPU** → throttled, not killed." },

    { id:"k-helm", cat:"k8s",
      prompt:"A deploy went bad. How do you roll back?",
      a:"- `helm history <release>` to find the last good revision, then `helm rollback <release> <rev>`.\n- e.g. history shows revision 41 was last good → `helm rollback <release> 41`.\n- You can do this from any cluster terminal (Lens has one built in), but under the hood it's just the Helm CLI.\n\n**Prod nuance:** I'd prefer re-running the deploy job for the previous good tag so the revert is tracked in git/CI. A manual `helm rollback` is a **break-glass** move to stop the bleeding — then re-sync with the pipeline." },

    { id:"k-cicd", cat:"k8s",
      prompt:"Walk me through what happens when you git push (CI/CD).",
      a:"**A typical 3-stage GitLab CI pipeline — the branch/tag picks the environment.**\n\n- **Build** — static-analysis scan (SonarQube), install deps, copy env config, production build; save output as an artifact.\n- **Dockerize** — build the image, tag it by both commit **SHA** and branch, push to the registry.\n- **Deploy** — decode the kubeconfig, `helm upgrade --install` with the new image into the right namespace.\n\nTwo things I like: the **SHA tag** gives traceability and an easy rollback target, and **prod is gated behind a version tag** (not a branch push), so a production deploy is always deliberate." },

    { id:"k-req-limits", cat:"k8s",
      prompt:"Resource requests vs limits — what's the difference?",
      a:"- **Requests** — the guaranteed minimum the scheduler uses to *place* the pod; it only lands on a node with at least that much free.\n- **Limits** — the hard ceiling: exceed **memory** → **OOMKilled**; exceed **CPU** → **throttled**.\n\ne.g. a service requesting 500m CPU / 256Mi memory only schedules where that's available. If it blew past a memory limit it'd be OOMKilled rather than starving everything else on the node." },

    { id:"az-compute", cat:"azure",
      prompt:"Azure's main compute options — when do you pick each?",
      a:"**Pick by the trade-off of control vs convenience.**\n\n- **App Service** — PaaS for web apps/APIs. Easiest: deploy code, Azure runs it; easy scaling and deployment slots. My default for a standard web API.\n- **Azure Functions** — serverless, event-driven; pay-per-execution, scales to zero. For triggers, glue, background jobs.\n- **Container Apps** — serverless *containers* (managed, Kubernetes underneath) with scale-to-zero. Containers without running a cluster.\n- **AKS** — managed Kubernetes; most control and most complexity. When you genuinely need full K8s.\n\nRule of thumb: *App Service for a straightforward app, Functions for event-driven, Container Apps for containers without cluster ops, AKS when you truly need Kubernetes.*" },

    { id:"az-functions", cat:"azure",
      prompt:"What are Azure Functions — triggers and bindings?",
      a:"**Serverless, event-driven compute.**\n\n- You write a function; a **trigger** runs it — HTTP request, queue message, timer, blob created, Service Bus message.\n- **Bindings** declaratively wire inputs/outputs (read from a queue, write to a blob) without SDK boilerplate.\n- **Consumption plan** scales to zero and bills per-execution; Premium/Dedicated for no cold-start or long-running work.\n- Great for background jobs, integrations, scheduled tasks. The caveat to name: **cold starts** on Consumption.\n\nOne line: *trigger fires it, bindings feed it, and it scales with load automatically.*" },

    { id:"az-messaging", cat:"azure",
      prompt:"Azure messaging: Service Bus vs Event Hubs vs Event Grid.",
      a:"**Pick by the pattern.**\n\n- **Service Bus** — enterprise message **broker**: queues + topics/subscriptions, ordering, dead-letter, transactions. The Azure equivalent of RabbitMQ — reliable commands/work.\n- **Event Hubs** — high-throughput **event streaming** (millions/sec), consumers track offsets, replayable. The Azure Kafka — telemetry, logs, analytics ingestion.\n- **Event Grid** — lightweight **event routing** / pub-sub for reactive notifications (e.g. 'a blob was created').\n- **Storage Queue** — simple, cheap, basic queue.\n\nMap it: *Service Bus = reliable work queue, Event Hubs = firehose stream, Event Grid = event notifications.*" },

    { id:"az-cosmos", cat:"azure",
      prompt:"What is Cosmos DB and when would you use it?",
      a:"**Azure's globally distributed, multi-model NoSQL database.**\n\n- Document/key-value/graph, **single-digit-millisecond** latency, turnkey global replication.\n- Five **consistency levels** on a spectrum from **Strong** (safest, slowest) to **Eventual** (fastest) — Session is the common default.\n- Billed in **RU/s** (Request Units) — you provision or autoscale throughput.\n- Reach for it for global scale, flexible schema, and massive throughput. For relational + transactional work, I'd still pick **Azure SQL**." },

    { id:"az-sql", cat:"azure",
      prompt:"What is Azure SQL Database?",
      a:"**Managed (PaaS) SQL Server.**\n\n- Microsoft runs patching, backups, and HA; you get a SQL Server–compatible database, so **EF Core code is unchanged**.\n- Purchasing models: **DTU** (bundled, simple) vs **vCore** (choose CPU/memory, more control, Hybrid Benefit).\n- **Serverless** tier auto-pauses when idle (cost saving); **Elastic Pools** share resources across many databases.\n- vs **SQL Managed Instance** — closer to full on-prem SQL Server (SQL Agent, cross-DB queries), for lift-and-shift." },

    { id:"az-keyvault", cat:"azure",
      prompt:"How do you handle secrets in Azure? (Key Vault + Managed Identity)",
      a:"**Never put secrets in appsettings or source control.**\n\n- **Key Vault** centrally stores secrets, keys, and certificates, with access policies and audit logging.\n- **Managed Identity** gives your App Service/Function an Azure AD identity, so it authenticates to Key Vault (and other Azure services) **with no stored credentials at all**.\n- The pattern: app uses its **Managed Identity** → reads the secret from **Key Vault** at runtime. Nothing sensitive in config or git.\n\nThis is exactly the answer interviewers are fishing for when they ask where you keep connection strings." },

    { id:"az-identity", cat:"azure",
      prompt:"What is a Managed Identity and why does it matter?",
      a:"**An Azure AD identity automatically managed for your resource — you never see or rotate a credential.**\n\n- **System-assigned** — tied to one resource's lifecycle. **User-assigned** — standalone, shareable across resources.\n- Use it to access Key Vault, Azure SQL, Storage, Service Bus **without secrets**: grant the identity an RBAC role, and the SDK gets tokens transparently.\n- The security win: **no credentials to leak, store, or rotate.** It's the modern default over connection strings and keys." },

    { id:"az-appinsights", cat:"azure",
      prompt:"What is Application Insights?",
      a:"**Azure's APM / observability, part of Azure Monitor.**\n\n- Collects **requests, dependencies, exceptions, traces, and custom metrics** from your app.\n- Gives distributed tracing, live metrics, failure/performance views, and **Kusto (KQL)** queries over the telemetry.\n- Wire it in via SDK or auto-instrumentation; correlate a slow request down to the exact failing dependency call.\n\nInterview framing: *this is how I'd diagnose a production latency or error spike — trace it end-to-end rather than guessing.*" },

    { id:"az-scaling", cat:"azure",
      prompt:"Scaling in Azure — up vs out?",
      a:"- **Scale up (vertical)** — a bigger instance (more CPU/RAM). Simple, but has a ceiling and often means downtime.\n- **Scale out (horizontal)** — *more* instances behind a load balancer. The cloud-preferred way: near-limitless and resilient. This is why app instances should be **stateless**.\n- **Autoscale** — rules on metrics (CPU, queue length) or a schedule add/remove instances automatically.\n\nApp Service and AKS both scale out; Functions on Consumption scales out automatically, including to zero." },

    { id:"az-iac", cat:"azure",
      prompt:"Infrastructure as Code and CI/CD on Azure.",
      a:"- **Bicep** (or ARM templates) declaratively defines your Azure resources — version-controlled, repeatable, no click-ops. Bicep is the cleaner modern syntax over raw ARM JSON.\n- **Azure DevOps Pipelines** / **GitHub Actions** build, test, and deploy — the same CI/CD discipline I run elsewhere, just Azure-flavoured.\n- **Deployment slots** on App Service give **blue-green / zero-downtime** releases with instant rollback (swap back).\n\nOne line: *infra defined in code, shipped through a pipeline, with slots for safe releases.*" }
  ];

  var QUIZ = [
    { id:"q-scoped", cat:"oop",
      prompt:"Which DI lifetime gives one instance per HTTP request?",
      choices:[["AddSingleton",0],["AddScoped",1],["AddTransient",0],["AddRequest",0]],
      e:"**Scoped** = one instance per scope, which in ASP.NET Core is per HTTP request. Singleton is one for the whole app; Transient is a new one every resolution; `AddRequest` isn't a thing." },

    { id:"q-single", cat:"oop",
      prompt:"You register a stateless clock that's safe to share app-wide. Which lifetime?",
      choices:[["AddSingleton",1],["AddScoped",0],["AddTransient",0],["It can't be shared",0]],
      e:"**Singleton** — one instance for the whole app is exactly right for a stateless, thread-safe shared service like a clock or config." },

    { id:"q-record", cat:"lang",
      prompt:"Two `record` instances with identical member values are compared with `==`. Result?",
      choices:[["false — different objects",0],["true — value-based equality",1],["Compile error",0],["Reference equality, so false",0]],
      e:"**true.** Records get compiler-generated **value-based equality** — equal when all members match. That's the headline difference from a class, which uses reference identity." },

    { id:"q-struct", cat:"lang",
      prompt:"A `struct` passed to a method is modified inside it. Does the caller see the change?",
      choices:[["Yes — same object",0],["No — it was copied",1],["Only if it's public",0],["Only with `ref`",1]],
      e:"**No** — a struct is a value type, so it's copied on the call; the method mutates its own copy. (Two answers are defensible: `ref` *would* let the caller see it — that's the honest nuance.)" },

    { id:"q-string", cat:"lang",
      prompt:"`string` in C# is…",
      choices:[["a value type",0],["a reference type that is immutable",1],["a struct",0],["mutable like a char array",0]],
      e:"**A reference type that's immutable.** It lives on the heap like other reference types, but because it can't be changed in place it *behaves* value-like. Heavy concatenation → use `StringBuilder`." },

    { id:"q-iqueryable", cat:"linq",
      prompt:"`db.Orders.Where(o => o.Total > 100)` on an `IQueryable`. Where does the filter run?",
      choices:[["In C#, after loading all rows",0],["In the database, as SQL WHERE",1],["Nowhere until enumerated — then in SQL",1],["In memory, always",0]],
      e:"It translates to a SQL `WHERE` and runs **in the database** — but only when the query is enumerated (deferred). Both those answers are right. Call `ToList()` *before* `Where` and you'd instead pull every row and filter in memory." },

    { id:"q-asyncvoid", cat:"async",
      prompt:"Which async return type should you avoid (outside event handlers)?",
      choices:[["Task",0],["Task<T>",0],["async void",1],["ValueTask",0]],
      e:"**`async void`.** Its exceptions can't be caught by the caller and it can't be awaited, so failures crash the process. Use `Task`/`Task<T>` so callers can await and handle errors." },

    { id:"q-dict", cat:"linq",
      prompt:"You need average O(1) lookup by key. Which collection?",
      choices:[["List<T>",0],["Dictionary<K,V>",1],["Array",0],["Queue<T>",0]],
      e:"**`Dictionary<K,V>`** — hash-based, average O(1) lookup/insert. A `List` lookup by value is O(n)." },

    { id:"q-const", cat:"lang",
      prompt:"Difference between `const` and `readonly`?",
      choices:[["No difference",0],["const = compile-time constant; readonly = set once at runtime (e.g. in a constructor)",1],["readonly is compile-time",0],["const can change per instance",0]],
      e:"**`const`** is baked in at compile time and must be a literal. **`readonly`** can be assigned at runtime — typically in the constructor — and can differ per instance. Reach for `readonly` when the value isn't known until construction." },

    { id:"q-dip", cat:"oop",
      prompt:"Which principle says the interface should be owned by the consumer, and abstractions shouldn't depend on details?",
      choices:[["Single Responsibility",0],["Liskov Substitution",0],["Dependency Inversion",1],["Interface Segregation",0]],
      e:"**Dependency Inversion.** Policy and detail both depend on an abstraction that lives with the policy side — `IOrderRepository` in the domain, `SqlOrderRepository` in infrastructure pointing up at it." },

    { id:"q-liskov", cat:"oop",
      prompt:"`IList<int> l = new[]{1,2,3}; l.Add(4);` throws NotSupportedException. Which principle does this illustrate breaking?",
      choices:[["Open/Closed",0],["Liskov Substitution",1],["Encapsulation",0],["Interface Segregation",0]],
      e:"**Liskov.** An array is a fixed-size `IList<T>` that can't honour `Add` — a subtype that throws what the base contract allows. It's exactly why `IReadOnlyList<T>` exists." },

    { id:"q-readiness", cat:"k8s",
      prompt:"A pod's readiness probe fails. What does Kubernetes do?",
      choices:[["Restarts the pod",0],["Stops routing traffic to it, but leaves it running",1],["Deletes the deployment",0],["Nothing",0]],
      e:"**Stops routing traffic** — pulls it out of the Service load-balancer but leaves it alive. Restarting on failure is the *liveness* probe. Readiness = 'not ready for traffic yet'." },

    { id:"q-liveness", cat:"k8s",
      prompt:"Which probe, on failure, causes Kubernetes to kill and restart the container?",
      choices:[["Readiness",0],["Liveness",1],["Startup only",0],["Neither",0]],
      e:"**Liveness.** It answers 'is the app wedged?' — failure triggers a restart. Readiness only controls traffic routing." },

    { id:"q-atleastonce", cat:"design",
      prompt:"Your broker guarantees at-least-once delivery. What must the consumer be?",
      choices:[["Faster",0],["Idempotent",1],["Single-threaded",0],["Stateless",0]],
      e:"**Idempotent** — at-least-once means the same message can arrive twice, so processing it twice must equal processing it once (dedup key + atomic check-and-write). Otherwise: double-charge, double-issue." },

    { id:"q-kafka", cat:"design",
      prompt:"You need multiple independent consumers to read the same event stream and replay from an earlier point. Which fits best?",
      choices:[["RabbitMQ",0],["Kafka",1],["A database table poll",0],["HTTP webhooks",0]],
      e:"**Kafka** — an append-only log that retains messages and lets each consumer track its own offset, so streams can be re-read and replayed. RabbitMQ deletes a message once it's acked." },

    { id:"q-task", cat:"async",
      prompt:"Best default for running asynchronous work in modern C#?",
      choices:[["new Thread(...)",0],["Task / async-await on the thread pool",1],["A busy-wait loop",0],["ThreadPool.QueueUserWorkItem manually",0]],
      e:"**Task with async/await.** Tasks run on the shared thread pool and the runtime schedules them; raw `Thread` objects are heavyweight and rarely what you want now." },

    { id:"q-using", cat:"lang",
      prompt:"What does a `using` statement / declaration guarantee?",
      choices:[["The object is garbage collected immediately",0],["Dispose() is called when the block exits, even on exception",1],["The object can't be null",0],["Thread safety",0]],
      e:"**`Dispose()` is called on scope exit**, even if an exception is thrown — the deterministic cleanup for `IDisposable` resources (DB connections, files, streams). It's not GC; it's the try/finally you don't have to write." },

    { id:"q-throughput", cat:"async",
      prompt:"Making a single database call `async` will…",
      choices:[["Make that call return faster",0],["Free the thread during the wait, improving throughput",1],["Reduce the query's execution time",0],["Run the query on multiple cores",0]],
      e:"**Free the thread**, so the server handles more concurrent work — throughput, not single-call speed. The 200ms query still takes 200ms; you've just stopped parking a thread on it." },

    { id:"q-isp", cat:"oop",
      prompt:"An implementation is full of `throw new NotImplementedException()`. Which SOLID smell is that?",
      choices:[["Open/Closed",0],["Interface Segregation — the interface is too fat",1],["Liskov",0],["Single Responsibility",0]],
      e:"**Interface Segregation.** Clients are forced to implement methods they don't use. Split the fat interface (e.g. `IReadRepository` / `IWriteRepository`) so each client depends only on what it calls. ISP is SRP for interfaces." },

    { id:"q-defer", cat:"linq",
      prompt:"You store a LINQ query in a variable and `foreach` over it twice. What happens?",
      choices:[["It runs once, cached",0],["It executes twice — two DB round-trips",1],["Compile error",0],["Only the first item is read",0]],
      e:"**Executes twice** — LINQ is deferred, so each enumeration re-runs the pipeline (and re-hits the database). Materialise once with `ToList()` if you'll iterate more than once." },

    { id:"q-atom", cat:"sql",
      prompt:"Which ACID property guarantees all-or-nothing — every statement commits or none does?",
      choices:[["Consistency",0],["Atomicity",1],["Isolation",0],["Durability",0]],
      e:"**Atomicity.** The transaction is indivisible: a failed step rolls the whole thing back. Durability is about surviving a crash *after* commit; Isolation is about concurrent transactions." },

    { id:"q-dirty", cat:"sql",
      prompt:"At which isolation level can a transaction read another's uncommitted changes (a dirty read)?",
      choices:[["Read Committed",0],["Read Uncommitted",1],["Repeatable Read",0],["Serializable",0]],
      e:"**Read Uncommitted** — the lowest level, it lets you see uncommitted data. Read Committed (the usual default) is the first level that prevents dirty reads." },

    { id:"q-innerjoin", cat:"sql",
      prompt:"An INNER JOIN between Customers and Orders returns…",
      choices:[["All customers, even without orders",0],["Only customers that have at least one order",1],["All orders, even without a customer",0],["Every combination of rows",0]],
      e:"**Only rows with a match in both tables.** Customers with no orders are excluded — you'd need a LEFT JOIN to keep them." },

    { id:"q-idxtrade", cat:"sql",
      prompt:"What's the main downside of adding lots of indexes?",
      choices:[["Reads get slower",0],["Writes (insert/update) get slower and storage grows",1],["Queries stop using them",0],["There's no downside",0]],
      e:"**Writes slow down** — every insert/update must maintain each index — and they cost storage. Indexes speed reads; you pay for them on writes, so index deliberately." },

    { id:"q-clustered", cat:"sql",
      prompt:"How many clustered indexes can a table have?",
      choices:[["As many as you like",0],["Exactly one",1],["One per column",0],["None allowed",0]],
      e:"**One.** A clustered index defines the physical row order, so there can only be one per table (typically the primary key). Non-clustered indexes you can have many." },

    { id:"q-fk", cat:"sql",
      prompt:"A foreign key primarily enforces…",
      choices:[["Uniqueness of a column",0],["Referential integrity between tables",1],["Faster queries",0],["Encryption of the column",0]],
      e:"**Referential integrity** — a child row can't reference a parent that doesn't exist, and you can't orphan children on delete. Uniqueness is a unique constraint / PK's job." },

    { id:"q-inject", cat:"sql",
      prompt:"Best defence against SQL injection?",
      choices:[["Escaping quotes by hand",0],["Parameterized queries / an ORM that parameterizes",1],["Hiding error messages",0],["Using stored procedures with string concatenation inside",0]],
      e:"**Parameterized queries** — the SQL and the data travel separately, so user input can never be parsed as SQL. String-concatenated queries (even inside a proc) are the vulnerability. EF Core parameterizes by default." },

    { id:"q-normal", cat:"sql",
      prompt:"Normalization primarily aims to reduce…",
      choices:[["Query time",0],["Data redundancy and update anomalies",1],["The number of tables",0],["Index size",0]],
      e:"**Redundancy** — each fact lives in one place, so you update it once, not in ten rows. Denormalization is the deliberate reverse, trading redundancy for faster reads." },

    { id:"q-optimistic", cat:"sql",
      prompt:"Optimistic concurrency detects a conflicting update using…",
      choices:[["A row lock held on read",0],["A version / rowversion column checked at update time",1],["A longer transaction",0],["A higher isolation level",0]],
      e:"**A version/timestamp column** — the UPDATE says `WHERE Version = @original`; 0 rows affected means someone changed it first, so you retry. No lock is held (that'd be pessimistic)." },

    { id:"q-truncate", cat:"sql",
      prompt:"Compared with DELETE, TRUNCATE TABLE…",
      choices:[["Can use a WHERE clause",0],["Is faster, removes all rows, and can't be filtered",1],["Removes the table structure too",0],["Is the same as DROP",0]],
      e:"**Faster, all-rows, no WHERE** — TRUNCATE deallocates pages with minimal logging and usually resets identity. DELETE is row-by-row and can be filtered; DROP removes the table itself." },

    { id:"q-having", cat:"sql",
